name: Docker

# Builds the multi-arch Docker image and pushes it to GHCR. This image is used
# by BOTH deployment flavors:
#   - standalone: `docker pull ghcr.io/steiner-dominik/tesla-invoices`
#   - Home Assistant app: the home-assistant-apps repository config.yaml references
#     this image via its `image:` key; the Supervisor pulls `<image>:<version>`,
#     so every app release needs a matching image tag (published releases
#     here are tagged with the calendar version, e.g. 2026.07.01).

on:
  release:
    types: [published]
  push:
    branches:
      - main
      - 'dev*'
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tesla-invoices

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Zero-padded CalVer (e.g. 2026.07.01) is not valid semver
            # (leading zeros), so type=semver would skip the tag — match the
            # release tag explicitly instead. The second rule adds a monthly
            # convenience tag (2026.07); `latest` is applied automatically
            # (flavor latest=auto also covers type=match).
            type=match,pattern=^(\d{4}\.\d{2}\.\d{2})$,group=1
            type=match,pattern=^(\d{4}\.\d{2})\.\d{2}$,group=1
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # linux/arm/v7 dropped: curl_cffi ships no musl wheel for it
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
