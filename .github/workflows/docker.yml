name: Docker

# Builds the multi-arch Docker image and pushes it to GHCR. This image is used
# by BOTH deployment flavors:
#   - standalone: `docker pull ghcr.io/steiner-dominik/tesla-invoices`
#   - Home Assistant app: the home-assistant-apps repository config.yaml references
#     this image via its `image:` key; the Supervisor pulls `<image>:<version>`,
#     so every app release needs a matching image tag (published releases
#     here are tagged with the calendar version, e.g. 2026.07.18.1 —
#     YYYY.MM.DD.N, where N counts releases on the same day).

on:
  release:
    types: [published]
  push:
    branches:
      - main
      - 'dev*'
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tesla-invoices

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Zero-padded CalVer (e.g. 2026.07.18.1) is not valid semver
            # (leading zeros), so type=semver would skip the tag — match the
            # release tag explicitly instead. The second and third rules add
            # daily (2026.07.18) and monthly (2026.07) convenience tags;
            # `latest` is applied automatically (flavor latest=auto also
            # covers type=match). The last rule keeps the pre-2026.07.18
            # YYYY.MM.patch release tags building, should one ever be re-run.
            type=match,pattern=^(\d{4}\.\d{2}\.\d{2}\.\d+)$,group=1
            type=match,pattern=^(\d{4}\.\d{2}\.\d{2})\.\d+$,group=1
            type=match,pattern=^(\d{4}\.\d{2})\.\d{2}(\.\d+)?$,group=1
            type=match,pattern=^(\d{4}\.\d{2}\.\d{2})$,group=1
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # linux/arm/v7 dropped: curl_cffi ships no musl wheel for it
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          # Embed an SBOM attestation and build provenance into the pushed
          # image (inspect with `docker buildx imagetools inspect ... --format
          # '{{ json .SBOM }}'`), so the image contents stay auditable even
          # if this repository disappears.
          sbom: true
          provenance: mode=max

  # A human-usable CycloneDX SBOM as a release asset, generated from the
  # pinned requirements.txt (the exported uv.lock the image installs from) —
  # see README "Dependencies, SBOM & continuity".
  sbom:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Generate SBOM (CycloneDX JSON)
        run: uvx --from cyclonedx-bom cyclonedx-py requirements requirements.txt --of JSON -o sbom.cdx.json
      - name: Attach SBOM to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload '${{ github.event.release.tag_name }}' sbom.cdx.json --clobber
