name: CI

on:
  push:
    branches:
      - main
      - 'dev*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies (locked)
        # --locked fails if uv.lock is out of sync with pyproject.toml,
        # so dependency changes can never slip in unpinned.
        run: uv sync --locked
      - name: Verify requirements.txt matches the lockfile
        # The Docker image installs from requirements.txt; it must be the
        # exported lockfile, not a hand-edited file. Comment lines are
        # ignored: the generated header embeds the output file name.
        run: |
          uv export --no-dev --no-hashes --no-emit-project --output-file /tmp/requirements.txt
          diff <(grep -v '^#' /tmp/requirements.txt) <(grep -v '^#' requirements.txt)
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
