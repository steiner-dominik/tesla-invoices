name: CI

on:
  push:
    branches:
      - main
      - 'dev*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
